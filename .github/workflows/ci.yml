name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './dist/*'))"
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o ./dist/parcelcli ./cmd/parcelcli
