name: CI
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './dist/*'))"
      - run: go test ./...
      - run: go vet ./...
      - run: go build -ldflags "-X main.version=ci" -o ./dist/parcelcli ./cmd/parcelcli
      - run: ./dist/parcelcli --version
